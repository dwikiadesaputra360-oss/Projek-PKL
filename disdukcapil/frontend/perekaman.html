<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perekaman KTP - Disdukcapil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="assets/css/style.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-shield-check text-primary fs-3"></i>
            <span>Disdukcapil</span>
        </div>
        <a href="index.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a href="perekaman.html" class="active"><i class="bi bi-person-badge"></i>Perekaman KTP</a>
        <a href="pengaduan.html"><i class="bi bi-journal-text"></i>Pengaduan Harian</a>
        <a href="ganti-foto.html"><i class="bi bi-camera"></i>Ganti Foto KTP</a>
    </nav>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-light d-md-none" id="sidebarToggle">
                    <i class="bi bi-list fs-4"></i>
                </button>
                <h2 class="page-title mb-0">Data Perekaman KTP</h2>
            </div>
            <div class="d-flex align-items-center mt-3 mt-md-0">
                <span class="text-muted me-3" id="currentDate"></span>
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
                    style="width: 40px; height: 40px;">
                    <i class="bi bi-person"></i>
                </div>
            </div>
        </div>

        <div id="alertBox" class="alert d-none" role="alert"></div>

        <div class="glass-card p-4 mb-4">
            <h5 class="fw-bold mb-3 border-bottom pb-2">Form Input Perekaman</h5>
            <form id="dataForm">
                <input type="hidden" id="editId">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-muted fw-bold small text-uppercase">Nama Lengkap</label>
                        <input type="text" class="form-control" id="nama" placeholder="Masukkan nama" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-muted fw-bold small text-uppercase">Tempat Lahir</label>
                        <input type="text" class="form-control" id="tempat_lahir" placeholder="Tempat Lahir">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-muted fw-bold small text-uppercase">Tanggal Lahir</label>
                        <input type="date" class="form-control" id="tanggal_lahir">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-muted fw-bold small text-uppercase">Kecamatan</label>
                        <input type="text" class="form-control" id="kecamatan" placeholder="Masukkan kecamatan"
                            required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-muted fw-bold small text-uppercase">No HP</label>
                        <input type="text" class="form-control" id="no_hp" placeholder="Masukkan No HP" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-muted fw-bold small text-uppercase">Status</label>
                        <select class="form-select" id="status" required>
                            <option value="Lengkap">Lengkap</option>
                            <option value="Belum Lengkap / Perbaikan">Belum Lengkap / Perbaikan</option>
                            <option value="Perbaikan KK">Perbaikan KK</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex mt-2">
                    <button type="submit" class="btn btn-primary" id="saveBtn"><i class="bi bi-save me-1"></i> Simpan
                        Data</button>
                    <button type="button" class="btn btn-light border ms-2 d-none" id="cancelBtn"
                        onclick="resetForm()">Batal</button>
                </div>
            </form>
        </div>

        <div class="glass-card p-4 mb-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold text-warning mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Data Belum Lengkap
                    / Perbaikan</h5>
                <button class="btn btn-outline-danger" onclick="exportPDFPerbaikan()"><i class="bi bi-file-pdf"></i>
                    PDF</button>
            </div>
            <div class="table-responsive table-container p-0 border-0 shadow-none">
                <table class="table" id="dataTablePerbaikan">
                    <thead>
                        <tr>
                            <th width="5%">No</th>
                            <th>Nama</th>
                            <th>Tempat Lahir</th>
                            <th>Tanggal Lahir</th>
                            <th>Status</th>
                            <th width="18%" class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBodyPerbaikan">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="glass-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">Daftar Perekaman</h5>
                <div class="d-flex gap-2">
                    <div class="input-group" style="width: 250px;">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control border-start-0 bg-light" id="searchInput"
                            placeholder="Cari nama..." onkeyup="filterTable()">
                    </div>
                    <button class="btn btn-outline-danger" onclick="exportPDF()"><i class="bi bi-file-pdf"></i>
                        PDF</button>
                    <button class="btn btn-outline-success" onclick="exportExcel()"><i class="bi bi-file-excel"></i>
                        Excel</button>
                </div>
            </div>

            <div class="table-responsive table-container p-0 border-0 shadow-none">
                <table class="table" id="dataTable">
                    <thead>
                        <tr>
                            <th width="5%">No</th>
                            <th>Nama</th>
                            <th>Kecamatan</th>
                            <th>No HP</th>
                            <th>Status</th>
                            <th width="18%" class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        if (!localStorage.getItem('auth')) window.location.href = 'login.html';

        const API_URL = 'http://localhost:5000/api/perekaman';
        let records = [];

        // Set current date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('id-ID', options);

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                records = await res.json();
                renderTable(records);
            } catch (err) {
                showAlert('Gagal memuat data', 'danger');
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const tbodyPerbaikan = document.getElementById('tableBodyPerbaikan');
            tbody.innerHTML = '';
            tbodyPerbaikan.innerHTML = '';

            let noUtama = 1;
            let noPerbaikan = 1;
            const dtOptions = { year: 'numeric', month: 'long', day: 'numeric' };

            data.forEach((row) => {
                let statusBadge = 'bg-secondary';
                if (row.status === 'Lengkap') statusBadge = 'bg-success';
                else if (row.status === 'Belum Lengkap / Perbaikan') statusBadge = 'bg-warning text-dark';
                else if (row.status === 'Perbaikan KK') statusBadge = 'bg-danger';

                const actionButtons = `
                <div class="d-flex justify-content-center gap-2">
                    <button class="btn btn-sm btn-outline-warning" onclick='editData(${JSON.stringify(row)})'><i class="bi bi-pencil"></i> Edit</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteData(${row.id})"><i class="bi bi-trash"></i> Hapus</button>
                </div>
            `;

                if (row.status === 'Belum Lengkap / Perbaikan' || row.status === 'Perbaikan KK') {
                    const trPerbaikan = document.createElement('tr');
                    const tglLahirFormatted = row.tanggal_lahir ? new Date(row.tanggal_lahir).toLocaleDateString('id-ID', dtOptions) : '-';
                    trPerbaikan.innerHTML = `
                    <td>${noPerbaikan++}</td>
                    <td>${row.nama}</td>
                    <td>${row.tempat_lahir || '-'}</td>
                    <td>${tglLahirFormatted}</td>
                    <td><span class="badge ${statusBadge}">${row.status}</span></td>
                    <td>${actionButtons}</td>
                `;
                    tbodyPerbaikan.appendChild(trPerbaikan);
                } else {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                    <td>${noUtama++}</td>
                    <td>${row.nama}</td>
                    <td>${row.kecamatan}</td>
                    <td>${row.no_hp}</td>
                    <td><span class="badge ${statusBadge}">${row.status || 'Lengkap'}</span></td>
                    <td>${actionButtons}</td>
                `;
                    tbody.appendChild(tr);
                }
            });
        }

        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const payload = {
                nama: document.getElementById('nama').value,
                tempat_lahir: document.getElementById('tempat_lahir').value,
                tanggal_lahir: document.getElementById('tanggal_lahir').value,
                kecamatan: document.getElementById('kecamatan').value,
                no_hp: document.getElementById('no_hp').value,
                status: document.getElementById('status').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.success) {
                    showAlert(result.message, 'success');
                    resetForm();
                    loadData();
                }
            } catch (err) {
                showAlert('Terjadi kesalahan', 'danger');
            }
        });

        function editData(row) {
            document.getElementById('editId').value = row.id;
            document.getElementById('nama').value = row.nama;
            document.getElementById('tempat_lahir').value = row.tempat_lahir || '';
            document.getElementById('tanggal_lahir').value = row.tanggal_lahir ? row.tanggal_lahir.split('T')[0] : '';
            document.getElementById('kecamatan').value = row.kecamatan;
            document.getElementById('no_hp').value = row.no_hp;
            document.getElementById('status').value = row.status || 'Lengkap';
            document.getElementById('saveBtn').textContent = 'Update Data';
            document.getElementById('saveBtn').classList.replace('btn-primary', 'btn-warning');
            document.getElementById('cancelBtn').classList.remove('d-none');
        }

        async function deleteData(id) {
            if (!confirm('Yakin ingin menghapus data ini?')) return;
            try {
                const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    showAlert(result.message, 'success');
                    loadData();
                }
            } catch (err) {
                showAlert('Gagal menghapus data', 'danger');
            }
        }

        function resetForm() {
            document.getElementById('dataForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('saveBtn').textContent = 'Simpan Data';
            document.getElementById('saveBtn').classList.replace('btn-warning', 'btn-primary');
            document.getElementById('cancelBtn').classList.add('d-none');
        }

        function showAlert(message, type) {
            const box = document.getElementById('alertBox');
            box.textContent = message;
            box.className = `alert alert-${type} alert-dismissible fade show`;
            setTimeout(() => box.classList.add('d-none'), 3000);
        }

        function filterTable() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = records.filter(row => row.nama.toLowerCase().includes(keyword));
            renderTable(filtered);
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Data Perekaman KTP", 14, 15);
            doc.autoTable({
                startY: 20,
                head: [['No', 'Nama', 'Kecamatan', 'No HP', 'Status']],
                body: records.map((r, i) => [i + 1, r.nama, r.kecamatan, r.no_hp, r.status || 'Lengkap']),
            });
            doc.save("Perekaman_KTP.pdf");
        }

        function exportPDFPerbaikan() {
            const dtOptions = { year: 'numeric', month: 'long', day: 'numeric' };
            const incompleteRecords = records.filter(row => row.status === 'Belum Lengkap / Perbaikan' || row.status === 'Perbaikan KK');

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Data Belum Lengkap / Perbaikan", 14, 15);
            doc.autoTable({
                startY: 20,
                head: [['No', 'Nama', 'Tempat Lahir', 'Tanggal Lahir', 'Status']],
                body: incompleteRecords.map((r, i) => {
                    const tgl = r.tanggal_lahir ? new Date(r.tanggal_lahir).toLocaleDateString('id-ID', dtOptions) : '-';
                    return [i + 1, r.nama, r.tempat_lahir || '-', tgl, r.status];
                }),
            });
            doc.save("Data_Perbaikan_KTP.pdf");
        }

        function exportExcel() {
            const wsData = records.map((r, i) => ({
                No: i + 1, Nama: r.nama, Kecamatan: r.kecamatan, "No HP": r.no_hp, Status: r.status || 'Lengkap'
            }));
            const ws = XLSX.utils.json_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Perekaman");
            XLSX.writeFile(wb, "Perekaman_KTP.xlsx");
        }

        loadData();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.querySelector('.sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('show');
                sidebarOverlay.classList.toggle('show');
            });
        }

        if (sidebarOverlay) {
            sidebarOverlay.addEventListener('click', () => {
                sidebar.classList.remove('show');
                sidebarOverlay.classList.remove('show');
            });
        }
    </script>
</body>

</html>
