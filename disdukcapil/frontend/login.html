<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Informasi Disdukcapil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        <div class="login-container glass-card text-center">
            <div class="mb-4">
                <h4 class="login-title">Disdukcapil Login</h4>
                <p class="text-muted">Sistem Laporan Pencatatan Harian</p>
            </div>
            
            <div id="alertBox" class="alert d-none" role="alert"></div>
            
            <form id="loginForm">
                <div class="mb-4 text-start">
                    <label for="username" class="form-label text-muted fw-bold small text-uppercase">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Masukkan username" required>
                </div>
                <div class="mb-4 text-start">
                    <label for="password" class="form-label text-muted fw-bold small text-uppercase">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Masuk ke Sistem</button>
            </form>
            
            <div class="mt-4 pt-3 border-top border-light text-muted small">
                &copy; 2026 Disdukcapil
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertBox');

            try {
                const res = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                alertBox.classList.remove('d-none', 'alert-success', 'alert-danger');
                if (data.success) {
                    alertBox.classList.add('alert-success');
                    alertBox.textContent = data.message;
                    localStorage.setItem('auth', 'true');
                    setTimeout(() => window.location.href = 'index.html', 1000);
                } else {
                    alertBox.classList.add('alert-danger');
                    alertBox.textContent = data.message;
                }
            } catch (err) {
                alertBox.classList.remove('d-none');
                alertBox.classList.add('alert-danger');
                alertBox.textContent = 'Gagal terhubung ke server';
            }
        });
    </script>
</body>
</html>
